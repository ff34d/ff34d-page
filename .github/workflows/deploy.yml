name: Deploy Astro with Bun

on:
   push:
      branches: [main]

permissions:
   contents: read
   pages: write
   id-token: write

jobs:
   build-and-deploy:
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 22

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install dependencies
           run: bun install

         - name: Build project
           run: bun run build

         - name: Upload production assets
           uses: actions/upload-pages-artifact@v3
           with:
              path: ./dist

         - name: Deploy to GitHub Pages
           id: deployment
           uses: actions/deploy-pages@v4
