name: Deploy Astro with Bun

on:
   push:
      branches: [main]

permissions:
   contents: read
   pages: write
   id-token: write

jobs:
   build-and-deploy:
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 22.12.0

         - name: Install and Build
           uses: withastro/action@v3

         - name: Deploy
           id: deployment
           uses: actions/deploy-pages@v4
